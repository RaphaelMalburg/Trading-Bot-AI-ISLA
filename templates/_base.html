<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ISLA Bot{% endblock %}</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --accent: #1f6feb;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.5; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px; }
    nav .brand { font-weight: 700; font-size: 16px; color: var(--text); text-decoration: none; letter-spacing: .5px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 14px; padding: 4px 0; border-bottom: 2px solid transparent; }
    nav a:hover, nav a.active { color: var(--text); border-bottom-color: var(--accent); }

    main { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 900px) { .grid-4 { grid-template-columns: 1fr 1fr; } .grid-2 { grid-template-columns: 1fr; } }
    @media (max-width: 500px) { .grid-4 { grid-template-columns: 1fr; } }

    .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; }
    .card-value { font-size: 22px; font-weight: 700; }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .green { color: var(--green); }
    .red   { color: var(--red); }
    .yellow { color: var(--yellow); }
    .blue  { color: var(--blue); }
    .muted { color: var(--muted); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: .4px; }
    .badge-green { background: rgba(63,185,80,.15); color: var(--green); }
    .badge-red   { background: rgba(248,81,73,.15);  color: var(--red); }
    .badge-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
    .badge-blue  { background: rgba(88,166,255,.15); color: var(--blue); }
    .badge-muted { background: rgba(139,148,158,.12); color: var(--muted); }

    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(48,54,61,.5); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .alert { padding: 10px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .alert-yellow { background: rgba(210,153,34,.12); border: 1px solid rgba(210,153,34,.4); color: var(--yellow); }
    .alert-red    { background: rgba(248,81,73,.12);  border: 1px solid rgba(248,81,73,.4);  color: var(--red); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; overflow: hidden; }
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }

    .btn { display: inline-block; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; background: rgba(139,148,158,.08); color: var(--muted); }
    .btn:hover { background: rgba(139,148,158,.15); color: var(--text); border-color: rgba(139,148,158,.5); }
    .btn-red  { background: rgba(248,81,73,.15); color: var(--red); border-color: rgba(248,81,73,.4); }
    .btn-red:hover { background: rgba(248,81,73,.25); }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">ISLA Bot</a>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
    <a href="/backtest" {% if request.path == '/backtest' %}class="active"{% endif %}>Backtest</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
